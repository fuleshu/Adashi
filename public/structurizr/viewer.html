<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./js/jquery-3.6.3.min.js"></script>
    <script src="./js/lodash-4.17.21.js"></script>
    <script src="./js/backbone-1.4.1.js"></script>
    <script src="./js/graphlib.js"></script>
    <script src="./js/dagre.js"></script>
    <script src="./js/joint-3.6.5.js"></script>
    <script src="./js/structurizr.js"></script>
    <script src="./js/structurizr-util.js"></script>
    <script src="./js/structurizr-ui.js"></script>
    <script src="./js/structurizr-workspace.js"></script>
    <script src="./js/structurizr-diagram.js"></script>
    <link href="./css/joint-3.6.5.css" rel="stylesheet" />
    <link href="./css/structurizr.css" rel="stylesheet" />
    <style>
      html,
      body,
      #diagram {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #f7f7f2;
      }

      body {
        font-family: Arial, sans-serif;
      }

      .empty {
        align-items: center;
        color: #4b5563;
        display: flex;
        height: 100%;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="diagram" class="empty">Waiting for Structurizr workspace...</div>
    <script>
      let currentDiagram;
      let fitTimer;
      let currentZoomPercent = 100;
      let currentFontSize = 20;
      let lastWorkspacePayload = null;
      let pendingZoomPercent = null;

      const minimumFontSize = 12;
      const maximumFontSize = 28;
      const relationshipFontRatio = 0.8;

      function clampFontSize(fontSize) {
        if (typeof fontSize !== "number" || !Number.isFinite(fontSize)) {
          return currentFontSize;
        }

        return Math.max(minimumFontSize, Math.min(maximumFontSize, Math.round(fontSize)));
      }

      function cloneWorkspace(workspace) {
        return JSON.parse(JSON.stringify(workspace));
      }

      function findStyle(styles, tag) {
        return styles.find(function (style) {
          return style && style.tag === tag;
        });
      }

      function ensureStyle(styles, tag) {
        let style = findStyle(styles, tag);

        if (!style) {
          style = { tag };
          styles.push(style);
        }

        return style;
      }

      function applyFontSize(workspace, fontSize) {
        const adjustedWorkspace = cloneWorkspace(workspace);
        const configuration = adjustedWorkspace.views && adjustedWorkspace.views.configuration;

        if (!configuration) {
          return adjustedWorkspace;
        }

        configuration.styles = configuration.styles || {};
        configuration.styles.elements = configuration.styles.elements || [];
        configuration.styles.relationships = configuration.styles.relationships || [];

        const elementFontSize = clampFontSize(fontSize);
        const relationshipFontSize = Math.max(10, Math.round(elementFontSize * relationshipFontRatio));

        ensureStyle(configuration.styles.elements, "Element").fontSize = elementFontSize;
        configuration.styles.elements.forEach(function (style) {
          if (style && typeof style.tag === "string" && !style.tag.startsWith("Diagram:")) {
            style.fontSize = elementFontSize;
          }
        });

        ensureStyle(configuration.styles.relationships, "Relationship").fontSize = relationshipFontSize;
        configuration.styles.relationships.forEach(function (style) {
          if (style) {
            style.fontSize = relationshipFontSize;
          }
        });

        return adjustedWorkspace;
      }

      function fitDiagram() {
        if (!currentDiagram) {
          return;
        }

        window.clearTimeout(fitTimer);
        fitTimer = window.setTimeout(function () {
          currentDiagram.resize();
          currentDiagram.zoomFitContent();
        }, 40);
      }

      function notifyZoomChanged() {
        window.parent.postMessage(
          {
            type: "adashi:structurizr-zoom-changed",
            zoomPercent: currentZoomPercent,
          },
          "*",
        );
      }

      function trackZoom(diagram) {
        const originalZoomTo = diagram.zoomTo.bind(diagram);

        diagram.zoomTo = function (zoomScale) {
          originalZoomTo(zoomScale);
          currentZoomPercent = Math.round(zoomScale * 100);
          notifyZoomChanged();
        };
      }

      function setZoomPercent(zoomPercent) {
        if (!currentDiagram || typeof zoomPercent !== "number" || !Number.isFinite(zoomPercent)) {
          pendingZoomPercent = zoomPercent;
          return;
        }

        currentDiagram.zoomTo(Math.max(25, Math.min(220, zoomPercent)) / 100);
      }

      function applyAutomaticLayout() {
        if (!currentDiagram) {
          return;
        }

        const view = currentDiagram.getCurrentView && currentDiagram.getCurrentView();
        const layout = view && view.automaticLayout;

        if (!layout || layout.implementation !== "Dagre") {
          return;
        }

        if (typeof currentDiagram.runDagre !== "function") {
          return;
        }

        currentDiagram.runDagre(
          layout.rankDirection || "TopBottom",
          layout.rankSeparation || 300,
          layout.nodeSeparation || 300,
          layout.edgeSeparation || 100,
          layout.vertices !== false,
          80,
          true,
        );
      }

      function renderWorkspace(payload) {
        lastWorkspacePayload = {
          workspace: payload.workspace,
          viewKey: payload.viewKey,
        };

        currentFontSize = clampFontSize(payload.fontSize);
        if (typeof payload.zoomPercent === "number" && Number.isFinite(payload.zoomPercent)) {
          pendingZoomPercent = payload.zoomPercent;
        }

        const workspaceSource = typeof payload.workspace === "string" ? JSON.parse(payload.workspace) : payload.workspace;
        const workspace = applyFontSize(workspaceSource, currentFontSize);
        const viewKey = payload.viewKey || workspace?.views?.configuration?.defaultView;
        const host = document.getElementById("diagram");

        host.className = "";
        host.innerHTML = "";
        structurizr.workspace = new structurizr.Workspace(workspace);
        currentDiagram = new structurizr.ui.Diagram("diagram", false, function () {
          trackZoom(currentDiagram);
          currentDiagram.onElementsSelected(function (elementIds) {
            window.parent.postMessage(
              {
                type: "adashi:structurizr-selection",
                entityType: "element",
                ids: elementIds,
              },
              "*",
            );
          });
          currentDiagram.onElementDoubleClicked(function (_event, elementId) {
            window.parent.postMessage(
              {
                type: "adashi:structurizr-open",
                entityType: "element",
                id: elementId,
              },
              "*",
            );
          });
          currentDiagram.onRelationshipDoubleClicked(function (_event, relationshipId) {
            window.parent.postMessage(
              {
                type: "adashi:structurizr-open",
                entityType: "relationship",
                id: relationshipId,
              },
              "*",
            );
          });
          currentDiagram.changeView(viewKey, function () {
            applyAutomaticLayout();
            if (pendingZoomPercent === null || pendingZoomPercent === 0) {
              fitDiagram();
            } else {
              setZoomPercent(pendingZoomPercent);
            }
          });
        });
      }

      function setFontSize(fontSize, zoomPercent) {
        currentFontSize = clampFontSize(fontSize);

        if (typeof zoomPercent === "number" && Number.isFinite(zoomPercent)) {
          pendingZoomPercent = zoomPercent;
        }

        if (lastWorkspacePayload) {
          renderWorkspace({
            ...lastWorkspacePayload,
            fontSize: currentFontSize,
          });
        }
      }

      if ("ResizeObserver" in window) {
        const observer = new ResizeObserver(fitDiagram);
        observer.observe(document.getElementById("diagram"));
      }

      window.addEventListener("resize", fitDiagram);

      window.addEventListener(
        "wheel",
        function (event) {
          if (!event.ctrlKey || !currentDiagram) {
            return;
          }

          event.preventDefault();

          if (event.deltaY < 0) {
            currentDiagram.zoomIn(event);
          } else {
            currentDiagram.zoomOut(event);
          }
        },
        { passive: false },
      );

      window.addEventListener("message", function (event) {
        if (event.data && event.data.type === "adashi:structurizr-workspace") {
          renderWorkspace(event.data);
        }

        if (event.data && event.data.type === "adashi:structurizr-zoom") {
          setZoomPercent(event.data.zoomPercent);
        }

        if (event.data && event.data.type === "adashi:structurizr-font-size") {
          setFontSize(event.data.fontSize, event.data.zoomPercent);
        }

        if (event.data && event.data.type === "adashi:structurizr-fit") {
          pendingZoomPercent = 0;
          fitDiagram();
        }
      });
    </script>
  </body>
</html>
