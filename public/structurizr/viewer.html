<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./js/jquery-3.6.3.min.js"></script>
    <script src="./js/lodash-4.17.21.js"></script>
    <script src="./js/backbone-1.4.1.js"></script>
    <script src="./js/joint-3.6.5.js"></script>
    <script src="./js/structurizr.js"></script>
    <script src="./js/structurizr-util.js"></script>
    <script src="./js/structurizr-ui.js"></script>
    <script src="./js/structurizr-workspace.js"></script>
    <script src="./js/structurizr-diagram.js"></script>
    <link href="./css/joint-3.6.5.css" rel="stylesheet" />
    <link href="./css/structurizr.css" rel="stylesheet" />
    <style>
      html,
      body,
      #diagram {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #f7f7f2;
      }

      body {
        font-family: Arial, sans-serif;
      }

      .empty {
        align-items: center;
        color: #4b5563;
        display: flex;
        height: 100%;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="diagram" class="empty">Waiting for Structurizr workspace...</div>
    <script>
      let currentDiagram;
      let fitTimer;
      let currentZoomPercent = 100;
      let pendingZoomPercent = null;

      function fitDiagram() {
        if (!currentDiagram) {
          return;
        }

        window.clearTimeout(fitTimer);
        fitTimer = window.setTimeout(function () {
          currentDiagram.resize();
          currentDiagram.zoomFitContent();
        }, 40);
      }

      function notifyZoomChanged() {
        window.parent.postMessage(
          {
            type: "adashi:structurizr-zoom-changed",
            zoomPercent: currentZoomPercent,
          },
          "*",
        );
      }

      function trackZoom(diagram) {
        const originalZoomTo = diagram.zoomTo.bind(diagram);

        diagram.zoomTo = function (zoomScale) {
          originalZoomTo(zoomScale);
          currentZoomPercent = Math.round(zoomScale * 100);
          notifyZoomChanged();
        };
      }

      function setZoomPercent(zoomPercent) {
        if (!currentDiagram || typeof zoomPercent !== "number" || !Number.isFinite(zoomPercent)) {
          pendingZoomPercent = zoomPercent;
          return;
        }

        currentDiagram.zoomTo(Math.max(25, Math.min(220, zoomPercent)) / 100);
      }

      function clusterCoordinates(values) {
        return values
          .filter((value) => typeof value === "number" && Number.isFinite(value))
          .sort((left, right) => left - right)
          .reduce((clusters, value) => {
            const previous = clusters[clusters.length - 1];

            if (previous !== undefined && Math.abs(previous - value) < 96) {
              clusters[clusters.length - 1] = Math.round((previous + value) / 2);
            } else {
              clusters.push(value);
            }

            return clusters;
          }, []);
      }

      function nearestCoordinateIndex(value, coordinates) {
        let bestIndex = 0;
        let bestDistance = Number.POSITIVE_INFINITY;

        coordinates.forEach((coordinate, index) => {
          const distance = Math.abs(coordinate - value);
          if (distance < bestDistance) {
            bestIndex = index;
            bestDistance = distance;
          }
        });

        return bestIndex;
      }

      function buildTopologyLayers(elements, relationships) {
        const outgoing = new Map();
        const indegree = new Map();
        const layers = new Map();

        elements.forEach((element) => {
          outgoing.set(element.id, []);
          indegree.set(element.id, 0);
          layers.set(element.id, 0);
        });

        relationships.forEach((relationship) => {
          outgoing.get(relationship.sourceId).push(relationship.destinationId);
          indegree.set(relationship.destinationId, (indegree.get(relationship.destinationId) || 0) + 1);
        });

        const queue = elements.filter((element) => indegree.get(element.id) === 0).map((element) => element.id);
        const visited = new Set();

        while (queue.length > 0) {
          const current = queue.shift();
          visited.add(current);
          outgoing.get(current).forEach((destinationId) => {
            layers.set(destinationId, Math.max(layers.get(destinationId) || 0, (layers.get(current) || 0) + 1));
            indegree.set(destinationId, (indegree.get(destinationId) || 0) - 1);
            if (indegree.get(destinationId) === 0) {
              queue.push(destinationId);
            }
          });
        }

        elements.forEach((element) => {
          if (!visited.has(element.id)) {
            const inboundLayers = relationships
              .filter((relationship) => relationship.destinationId === element.id && visited.has(relationship.sourceId))
              .map((relationship) => layers.get(relationship.sourceId) || 0);

            if (inboundLayers.length > 0) {
              layers.set(element.id, Math.max(...inboundLayers) + 1);
            }
          }
        });

        return layers;
      }

      function buildLayoutLayers(elements, relationships, rankDirection) {
        const horizontal = rankDirection === "LeftRight" || rankDirection === "RightLeft";
        const coordinates = clusterCoordinates(elements.map((element) => (horizontal ? element.x : element.y)));

        if (coordinates.length > 1) {
          return new Map(
            elements.map((element) => [
              element.id,
              nearestCoordinateIndex(horizontal ? element.x : element.y, coordinates),
            ]),
          );
        }

        return buildTopologyLayers(elements, relationships);
      }

      function reorderBucketsByConnectivity(buckets, relationships, layers, horizontal) {
        const maxLayer = Math.max(0, ...Array.from(layers.values()));
        const originalOrder = new Map();

        buckets.forEach((bucket) => {
          bucket.forEach((element) => {
            originalOrder.set(element.id, horizontal ? element.y || 0 : element.x || 0);
          });
        });

        function neighborAverage(element, targetLayer) {
          const positions = [];
          const targetBucket = buckets.get(targetLayer) || [];
          const targetIndexes = new Map(targetBucket.map((target, index) => [target.id, index]));

          relationships.forEach((relationship) => {
            const neighborId =
              relationship.sourceId === element.id
                ? relationship.destinationId
                : relationship.destinationId === element.id
                  ? relationship.sourceId
                  : null;

            if (neighborId && layers.get(neighborId) === targetLayer && targetIndexes.has(neighborId)) {
              positions.push(targetIndexes.get(neighborId));
            }
          });

          if (positions.length === 0) {
            return Number.POSITIVE_INFINITY;
          }

          return positions.reduce((sum, position) => sum + position, 0) / positions.length;
        }

        for (let pass = 0; pass < 4; pass += 1) {
          for (let layer = 1; layer <= maxLayer; layer += 1) {
            const bucket = buckets.get(layer) || [];
            bucket.sort(
              (left, right) =>
                neighborAverage(left, layer - 1) - neighborAverage(right, layer - 1) ||
                (originalOrder.get(left.id) || 0) - (originalOrder.get(right.id) || 0) ||
                left.id.localeCompare(right.id),
            );
          }

          for (let layer = maxLayer - 1; layer >= 0; layer -= 1) {
            const bucket = buckets.get(layer) || [];
            bucket.sort(
              (left, right) =>
                neighborAverage(left, layer + 1) - neighborAverage(right, layer + 1) ||
                (originalOrder.get(left.id) || 0) - (originalOrder.get(right.id) || 0) ||
                left.id.localeCompare(right.id),
            );
          }
        }
      }

      function centerOf(element, horizontal) {
        return horizontal
          ? { primary: element.x + (element.width || 360) / 2, secondary: element.y + (element.height || 180) / 2 }
          : { primary: element.y + (element.height || 180) / 2, secondary: element.x + (element.width || 360) / 2 };
      }

      function primaryStart(element, horizontal) {
        return horizontal ? element.x : element.y;
      }

      function primaryEnd(element, horizontal) {
        return horizontal ? element.x + (element.width || 360) : element.y + (element.height || 180);
      }

      function secondaryStart(element, horizontal) {
        return horizontal ? element.y : element.x;
      }

      function secondaryEnd(element, horizontal) {
        return horizontal ? element.y + (element.height || 180) : element.x + (element.width || 360);
      }

      function toPoint(primary, secondary, horizontal) {
        return horizontal ? { x: primary, y: secondary } : { x: secondary, y: primary };
      }

      function relationshipInViewById(view) {
        return new Map((view.relationships || []).map((relationshipInView) => [relationshipInView.id, relationshipInView]));
      }

      function assignFallbackRelationshipRoutes(view, relationships, elements, layers, horizontal, margin) {
        const elementById = new Map(elements.map((element) => [element.id, element]));
        const relationshipViews = relationshipInViewById(view);
        const maxLayer = Math.max(0, ...Array.from(layers.values()));
        const maxPrimary = Math.max(...elements.map((element) => primaryEnd(element, horizontal)), margin);
        const maxSecondary = Math.max(...elements.map((element) => secondaryEnd(element, horizontal)), margin);
        const minSecondary = Math.min(...elements.map((element) => secondaryStart(element, horizontal)), margin);
        const upperLane = Math.max(24, minSecondary - 110);
        const lowerLane = maxSecondary + 110;

        relationships.forEach((relationship, index) => {
          const source = elementById.get(relationship.sourceId);
          const destination = elementById.get(relationship.destinationId);
          const relationshipInView = relationshipViews.get(relationship.id);

          if (!source || !destination || !relationshipInView) {
            return;
          }

          const sourceLayer = layers.get(source.id) || 0;
          const destinationLayer = layers.get(destination.id) || 0;
          const sourceCenter = centerOf(source, horizontal);
          const destinationCenter = centerOf(destination, horizontal);
          const forward = sourceCenter.primary <= destinationCenter.primary;
          const sourceEdge = forward ? primaryEnd(source, horizontal) : primaryStart(source, horizontal);
          const destinationEdge = forward ? primaryStart(destination, horizontal) : primaryEnd(destination, horizontal);
          const layerDistance = Math.abs(destinationLayer - sourceLayer);
          const jitter = ((index % 5) - 2) * 14;
          let vertices;

          if (layerDistance <= 1) {
            const lane = (sourceEdge + destinationEdge) / 2 + jitter;
            vertices = [
              toPoint(lane, sourceCenter.secondary, horizontal),
              toPoint(lane, destinationCenter.secondary, horizontal),
            ];
          } else {
            const sourceLane = forward ? sourceEdge + 80 + jitter : sourceEdge - 80 + jitter;
            const destinationLane = forward ? destinationEdge - 80 + jitter : destinationEdge + 80 + jitter;
            const upperCost = Math.abs(sourceCenter.secondary - upperLane) + Math.abs(destinationCenter.secondary - upperLane);
            const lowerCost = Math.abs(sourceCenter.secondary - lowerLane) + Math.abs(destinationCenter.secondary - lowerLane);
            const escapeLane = upperCost < lowerCost ? upperLane : lowerLane;

            vertices = [
              toPoint(sourceLane, sourceCenter.secondary, horizontal),
              toPoint(sourceLane, escapeLane, horizontal),
              toPoint(destinationLane, escapeLane, horizontal),
              toPoint(destinationLane, destinationCenter.secondary, horizontal),
            ];
          }

          if (sourceLayer === destinationLayer) {
            const detour =
              sourceLayer >= maxLayer / 2
                ? maxPrimary + 100 + index * 6
                : Math.max(24, Math.min(primaryStart(source, horizontal), primaryStart(destination, horizontal)) - 100 - index * 6);

            vertices = [
              toPoint(detour, sourceCenter.secondary, horizontal),
              toPoint(detour, destinationCenter.secondary, horizontal),
            ];
          }

          relationshipInView.routing = "Orthogonal";
          relationshipInView.vertices = vertices;
          relationshipInView.position = 50;
        });
      }

      function applyFallbackAutomaticLayout(view, layout) {
        const elements = view.elements || [];
        const elementIds = new Set(elements.map((element) => element.id));
        const rankDirection = layout.rankDirection || "TopBottom";
        const horizontal = rankDirection === "LeftRight" || rankDirection === "RightLeft";
        const rankSeparation = Math.max(layout.rankSeparation || 300, 260);
        const nodeSeparation = Math.max(layout.nodeSeparation || 300, 160);
        const margin = 80;
        const relationships = (view.relationships || [])
          .map((relationshipInView) => structurizr.workspace.findRelationshipById(relationshipInView.id))
          .filter(
            (relationship) =>
              relationship &&
              elementIds.has(relationship.sourceId) &&
              elementIds.has(relationship.destinationId) &&
              relationship.sourceId !== relationship.destinationId,
          );
        const layers = buildLayoutLayers(elements, relationships, rankDirection);

        const maxLayer = Math.max(0, ...Array.from(layers.values()));
        const buckets = new Map();

        elements.forEach((element) => {
          const layer = layers.get(element.id) || 0;
          if (!buckets.has(layer)) {
            buckets.set(layer, []);
          }
          buckets.get(layer).push(element);
        });

        buckets.forEach((bucket) => {
          bucket.sort(
            (left, right) =>
              (horizontal ? left.y || 0 : left.x || 0) - (horizontal ? right.y || 0 : right.x || 0) ||
              left.id.localeCompare(right.id),
          );
        });

        reorderBucketsByConnectivity(buckets, relationships, layers, horizontal);

        const layerWidths = [];
        const layerHeights = [];
        let largestLayerSpan = 0;

        for (let layer = 0; layer <= maxLayer; layer += 1) {
          const bucket = buckets.get(layer) || [];
          layerWidths[layer] = Math.max(360, ...bucket.map((element) => element.width || 360));
          layerHeights[layer] = Math.max(180, ...bucket.map((element) => element.height || 180));
          largestLayerSpan = Math.max(
            largestLayerSpan,
            bucket.reduce((span, element) => span + (horizontal ? element.height || 180 : element.width || 360), 0) +
              Math.max(0, bucket.length - 1) * nodeSeparation,
          );
        }

        const layerOffsets = [];
        let offset = margin;
        for (let layer = 0; layer <= maxLayer; layer += 1) {
          layerOffsets[layer] = offset;
          offset += layerWidths[layer] + rankSeparation;
        }

        elements.forEach((element) => {
          const layer = layers.get(element.id) || 0;
          const bucket = buckets.get(layer) || [];
          const index = bucket.indexOf(element);
          const orderedLayer =
            rankDirection === "RightLeft" || rankDirection === "BottomTop" ? maxLayer - layer : layer;
          const primary = layerOffsets[orderedLayer] || margin;
          const bucketSpan =
            bucket.reduce((span, item) => span + (horizontal ? item.height || 180 : item.width || 360), 0) +
            Math.max(0, bucket.length - 1) * nodeSeparation;
          const bucketOffset = margin + Math.max(0, (largestLayerSpan - bucketSpan) / 2);
          const secondary =
            bucketOffset +
            bucket
              .slice(0, index)
              .reduce((span, item) => span + (horizontal ? item.height || 180 : item.width || 360) + nodeSeparation, 0);

          if (horizontal) {
            element.x = primary;
            element.y = secondary;
          } else {
            element.x = secondary;
            element.y = primary;
          }
        });

        assignFallbackRelationshipRoutes(view, relationships, elements, layers, horizontal, margin);

        const relationshipVertices = (view.relationships || []).flatMap((relationship) => relationship.vertices || []);
        const maxX = Math.max(...elements.map((element) => element.x + (element.width || 360)), margin);
        const maxY = Math.max(...elements.map((element) => element.y + (element.height || 180)), margin);
        const maxVertexX = Math.max(...relationshipVertices.map((vertex) => vertex.x), margin);
        const maxVertexY = Math.max(...relationshipVertices.map((vertex) => vertex.y), margin);

        view.dimensions = {
          width: Math.ceil(Math.max(maxX, maxVertexX) + margin + 260),
          height: Math.ceil(Math.max(maxY, maxVertexY) + margin + 260),
        };
        view.paperSize = undefined;
        currentDiagram.refresh();
        currentDiagram.autoPageSize();
      }

      function applyAutomaticLayout() {
        if (!currentDiagram) {
          return;
        }

        const view = currentDiagram.getCurrentView && currentDiagram.getCurrentView();
        const layout = view && view.automaticLayout;

        if (!layout || layout.implementation !== "Dagre") {
          return;
        }

        if (window.dagre && typeof currentDiagram.runDagre === "function") {
          currentDiagram.runDagre(
            layout.rankDirection || "TopBottom",
            layout.rankSeparation || 300,
            layout.nodeSeparation || 300,
            layout.edgeSeparation || 100,
            layout.vertices !== false,
            80,
            true,
          );
        } else {
          applyFallbackAutomaticLayout(view, layout);
        }
      }

      function renderWorkspace(payload) {
        const workspace = typeof payload.workspace === "string" ? JSON.parse(payload.workspace) : payload.workspace;
        const viewKey = payload.viewKey || workspace?.views?.configuration?.defaultView;
        const host = document.getElementById("diagram");

        host.className = "";
        host.innerHTML = "";
        structurizr.workspace = new structurizr.Workspace(workspace);
        currentDiagram = new structurizr.ui.Diagram("diagram", false, function () {
          trackZoom(currentDiagram);
          currentDiagram.onElementsSelected(function (elementIds) {
            window.parent.postMessage(
              {
                type: "adashi:structurizr-selection",
                entityType: "element",
                ids: elementIds,
              },
              "*",
            );
          });
          currentDiagram.onElementDoubleClicked(function (_event, elementId) {
            window.parent.postMessage(
              {
                type: "adashi:structurizr-open",
                entityType: "element",
                id: elementId,
              },
              "*",
            );
          });
          currentDiagram.onRelationshipDoubleClicked(function (_event, relationshipId) {
            window.parent.postMessage(
              {
                type: "adashi:structurizr-open",
                entityType: "relationship",
                id: relationshipId,
              },
              "*",
            );
          });
          currentDiagram.changeView(viewKey, function () {
            applyAutomaticLayout();
            if (pendingZoomPercent === null || pendingZoomPercent === 0) {
              fitDiagram();
            } else {
              setZoomPercent(pendingZoomPercent);
            }
          });
        });
      }

      if ("ResizeObserver" in window) {
        const observer = new ResizeObserver(fitDiagram);
        observer.observe(document.getElementById("diagram"));
      }

      window.addEventListener("resize", fitDiagram);

      window.addEventListener(
        "wheel",
        function (event) {
          if (!event.ctrlKey || !currentDiagram) {
            return;
          }

          event.preventDefault();

          if (event.deltaY < 0) {
            currentDiagram.zoomIn(event);
          } else {
            currentDiagram.zoomOut(event);
          }
        },
        { passive: false },
      );

      window.addEventListener("message", function (event) {
        if (event.data && event.data.type === "adashi:structurizr-workspace") {
          renderWorkspace(event.data);
        }

        if (event.data && event.data.type === "adashi:structurizr-zoom") {
          setZoomPercent(event.data.zoomPercent);
        }

        if (event.data && event.data.type === "adashi:structurizr-fit") {
          pendingZoomPercent = 0;
          fitDiagram();
        }
      });
    </script>
  </body>
</html>
